# CausalDiffTab experiment config — Opt-D
# 稀疏宏观因果图 + 禁止边惩罚：保留边不再作为正则惩罚目标，因果项只压制未保留的跨特征关系。
model_name: macro_sparse_forbidden_v2
experiment_id: macro_sparse_forbidden_v2
lambda_causal: 0.02
causal_start_frac: 0.5
causal_warmup_frac: 0.5
causal_mask_mode: forbidden_penalty
use_causal_masks: true
hierarchical: true
mask_subdir: causal_masks_macro_sparse
description: "优化 Opt-D：稀疏宏观因果边 + 禁止边惩罚 + 延迟退火，2024 45-col schema"
sampling:
  mode: impute_stage3
  num_samples: 10000
  impute_indices_count: 10000