# CausalDiffTab experiment config — v2 优化实验
# 完全体优化 Opt-B：降低因果正则强度 lambda=0.1
# 中间值，介于 Opt-A (0.05) 和原始 (0.3) 之间
model_name: macro_soft_lam01_v2
experiment_id: macro_soft_lam01_v2
lambda_causal: 0.1
use_causal_masks: true
hierarchical: true
mask_subdir: causal_masks_soft
description: "优化 Opt-B：宏观软因果骨架 + 分层 Inpainting，lambda=0.1（中等因果约束），2024 45-col schema"
sampling:
  mode: impute_stage3
  num_samples: 10000
  impute_indices_count: 10000
