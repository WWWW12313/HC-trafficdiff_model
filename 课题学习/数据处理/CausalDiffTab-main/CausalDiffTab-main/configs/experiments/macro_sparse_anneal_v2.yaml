# CausalDiffTab experiment config — v2 优化实验
# 稀疏宏观因果图 + 延迟退火 λ：前 50% epoch 关闭因果项，后 50% 线性升至 lambda=0.1
model_name: macro_sparse_anneal_v2
experiment_id: macro_sparse_anneal_v2
lambda_causal: 0.1
causal_start_frac: 0.5
causal_warmup_frac: 0.5
use_causal_masks: true
hierarchical: true
mask_subdir: causal_masks_macro_sparse
description: "优化 Opt-C：稀疏宏观因果边 + 延迟退火 causal lambda，2024 45-col schema"
sampling:
  mode: impute_stage3
  num_samples: 10000
  impute_indices_count: 10000